name: Deploy to Firebase Hosting
on:
  push:
    branches: [master]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g firebase-tools@13
      - run: firebase deploy --only hosting --project arteenluz-4ff43 --token "${{ secrets.FIREBASE_TOKEN }}"
